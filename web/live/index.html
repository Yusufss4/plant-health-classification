<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Plant health — live</title>
  <style>
    :root {
      --bg: #111;
      --fg: #eee;
      --muted: #999;
      --panel: #1a1a1a;
      --border: #333;
      --healthy: #4ade80;
      --diseased: #f87171;
      --background: #60a5fa;
      --unknown: #a3a3a3;
    }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      margin: 0;
      padding: 1rem;
      background: var(--bg);
      color: var(--fg);
      max-width: 760px;
      margin-inline: auto;
    }
    h1 { font-size: 1.25rem; margin: 0 0 0.75rem; font-weight: 600; }
    img {
      width: 100%;
      max-width: 640px;
      height: auto;
      border: 1px solid var(--border);
      border-radius: 6px;
      display: block;
    }
    #label-line {
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
      margin-top: 0.75rem;
      font-size: 1.4rem;
      font-weight: 700;
    }
    #label-name { letter-spacing: 0.5px; }
    #label-name[data-class="healthy"]    { color: var(--healthy); }
    #label-name[data-class="diseased"]   { color: var(--diseased); }
    #label-name[data-class="background"] { color: var(--background); }
    #label-name[data-class="unknown"]    { color: var(--unknown); }
    #label-conf { font-size: 1.0rem; color: var(--muted); font-weight: 500; }
    #error { color: #f87171; margin-top: 0.5rem; font-size: 0.9rem; min-height: 1.2rem; }
    table {
      margin-top: 0.75rem;
      width: 100%;
      max-width: 360px;
      border-collapse: collapse;
      font-size: 0.95rem;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }
    th, td {
      padding: 0.35rem 0.6rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    tr:last-child td { border-bottom: none; }
    th { font-weight: 600; color: var(--muted); }
    td.prob { font-variant-numeric: tabular-nums; text-align: right; }
    td.bar {
      width: 100%;
      padding: 0;
      border-bottom: 1px solid var(--border);
    }
    td.bar > div {
      height: 6px;
      background: var(--muted);
      transition: width 0.15s ease;
    }
    tr[data-class="healthy"]    td.bar > div { background: var(--healthy); }
    tr[data-class="diseased"]   td.bar > div { background: var(--diseased); }
    tr[data-class="background"] td.bar > div { background: var(--background); }
    #ts { margin-top: 0.5rem; color: var(--muted); font-size: 0.8rem; }
    #perf {
      margin-top: 0.5rem;
      color: var(--muted);
      font: 0.8rem ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      white-space: pre;
      line-height: 1.35;
    }
  </style>
</head>
<body>
  <h1>Plant health — live</h1>
  <img id="preview" src="/stream.mjpg" alt="camera preview" width="640" height="480" />

  <div id="label-line">
    <span id="label-name" data-class="unknown">Loading…</span>
    <span id="label-conf"></span>
  </div>

  <table>
    <thead>
      <tr><th>Class</th><th style="text-align:right">Probability</th></tr>
    </thead>
    <tbody id="prob-rows"></tbody>
  </table>

  <div id="ts"></div>
  <pre id="perf"></pre>
  <div id="error"></div>

  <!--
    This page is embedded into the live_infer_web binary at build time
    (see cpp/cmake/embed_html.cmake). The server it talks to exposes:
      GET /stream.mjpg  - multipart/x-mixed-replace MJPEG preview
      GET /events       - text/event-stream of inference result JSON
                          { "timestamp_ns", "label", "label_name",
                            "confidence", "logits", "probabilities" }

    CLASS_NAMES must match utils/data_loader.py DEFAULT_CLASSES on the
    training side (0=healthy, 1=diseased, 2=background). If the model
    output count ever changes, update both sides together.
  -->
  <script>
    const CLASS_NAMES = ['Healthy', 'Diseased', 'Background'];
    const CLASS_SLUGS = ['healthy', 'diseased', 'background'];

    function resolveClass(j) {
      // Prefer the index emitted by the model (always an integer).
      // Fall back to the optional label_name from the binary if present,
      // and only as a very last resort show the raw integer.
      const idx = typeof j.label === 'number' ? j.label : -1;
      if (idx >= 0 && idx < CLASS_NAMES.length) {
        return { name: CLASS_NAMES[idx], slug: CLASS_SLUGS[idx] };
      }
      if (j.label_name) {
        const slug = String(j.label_name).toLowerCase();
        const name = slug.charAt(0).toUpperCase() + slug.slice(1);
        return { name, slug };
      }
      return { name: 'Class ' + idx, slug: 'unknown' };
    }

    function ensureProbRows(n) {
      const tbody = document.getElementById('prob-rows');
      if (tbody.childElementCount === n) return;
      tbody.innerHTML = '';
      for (let i = 0; i < n; i++) {
        const tr = document.createElement('tr');
        const slug = i < CLASS_SLUGS.length ? CLASS_SLUGS[i] : 'unknown';
        const name = i < CLASS_NAMES.length ? CLASS_NAMES[i] : ('Class ' + i);
        tr.setAttribute('data-class', slug);
        tr.innerHTML =
          '<td>' + name + '</td>' +
          '<td class="prob" id="prob-' + i + '">-</td>';
        const trBar = document.createElement('tr');
        trBar.setAttribute('data-class', slug);
        trBar.innerHTML = '<td class="bar" colspan="2"><div id="bar-' + i + '" style="width:0%"></div></td>';
        tbody.appendChild(tr);
        tbody.appendChild(trBar);
      }
    }

    function setProbs(probs) {
      ensureProbRows(probs.length);
      for (let i = 0; i < probs.length; i++) {
        const p = probs[i];
        const td = document.getElementById('prob-' + i);
        const bar = document.getElementById('bar-' + i);
        if (td) td.textContent = (p * 100).toFixed(2) + '%';
        if (bar) bar.style.width = Math.min(100, Math.max(0, p * 100)).toFixed(2) + '%';
      }
    }

    function fmtTs(ns) {
      if (typeof ns !== 'number' || !isFinite(ns)) return '';
      const ms = Math.round(ns / 1e6);
      const d = new Date(ms);
      return d.toLocaleTimeString();
    }

    function applyResult(j) {
      const errEl = document.getElementById('error');
      try {
        const cls = resolveClass(j);
        const nameEl = document.getElementById('label-name');
        nameEl.textContent = cls.name;
        nameEl.setAttribute('data-class', cls.slug);

        const conf = typeof j.confidence === 'number'
          ? (j.confidence * 100).toFixed(2) + '% confidence'
          : '';
        document.getElementById('label-conf').textContent = conf;

        if (Array.isArray(j.probabilities) && j.probabilities.length > 0) {
          setProbs(j.probabilities);
        }

        if (typeof j.inference_ms === 'number') lastInferenceMs = j.inference_ms;
        if (typeof j.encode_ms === 'number') lastEncodeMs = j.encode_ms;

        document.getElementById('ts').textContent = fmtTs(j.timestamp_ns);
        errEl.textContent = '';
      } catch (e) {
        errEl.textContent = String(e);
      }
    }

    // Rolling 1-second window of SSE event timestamps. Used as the FPS
    // counter; the SSE rate equals the pipeline publish rate because the
    // server only emits one message per InferenceResult.
    const evWindow = [];
    let lastInferenceMs = 0;
    let lastEncodeMs = 0;

    function recordEvent() {
      const now = performance.now();
      evWindow.push(now);
      while (evWindow.length && now - evWindow[0] > 1000) evWindow.shift();
    }

    const es = new EventSource('/events');
    es.onmessage = (ev) => {
      recordEvent();
      let j;
      try { j = JSON.parse(ev.data); } catch (e) {
        document.getElementById('error').textContent = 'bad event payload: ' + e;
        return;
      }
      applyResult(j);
    };
    es.onerror = () => {
      document.getElementById('error').textContent =
        'event stream disconnected (browser will retry automatically)';
    };

    // 1 Hz updater for the perf panel. Polls /metrics for system state and
    // composes a small monospace block. All DOM writes here happen once per
    // second, regardless of camera frame rate, so this loop adds no per-
    // frame cost.
    let lastMetrics = null;
    const SSE_STATE = { 0: 'connecting', 1: 'open', 2: 'closed' };

    async function refreshPerf() {
      try {
        const r = await fetch('/metrics', { cache: 'no-store' });
        if (r.ok) lastMetrics = await r.json();
      } catch (_) { /* keep last */ }

      const stateText = SSE_STATE[es.readyState] || '?';
      const fps = evWindow.length;
      const m = lastMetrics || {};
      const lines = [
        `FPS: ${String(fps).padStart(4)}     SSE: ${stateText}`,
        `inf: ${lastInferenceMs.toFixed(1).padStart(6)} ms   enc: ${lastEncodeMs.toFixed(1).padStart(6)} ms`,
      ];
      const hasSys = m.cpu_percent != null || m.cpu_temp_c != null || m.mem_used_pct != null;
      if (hasSys) {
        const cpu  = m.cpu_percent != null ? m.cpu_percent.toFixed(0).padStart(3) + '%' : ' -- ';
        const temp = m.cpu_temp_c  != null ? m.cpu_temp_c.toFixed(1) + 'C'              : ' -- ';
        const mem  = m.mem_used_pct != null ? m.mem_used_pct.toFixed(0).padStart(3) + '%' : ' -- ';
        lines.push(`CPU: ${cpu}   T: ${temp}   MEM: ${mem}`);
      }
      document.getElementById('perf').textContent = lines.join('\n');
    }
    setInterval(refreshPerf, 1000);
    refreshPerf();
  </script>
</body>
</html>
