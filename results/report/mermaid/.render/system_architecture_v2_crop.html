<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @page { size: 6.07in 5.82in; margin: 0; }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "DejaVu Sans", "Liberation Sans", Arial, sans-serif;
    font-size: 11px;
    background: #fff;
    color: #1a1a2e;
    padding: 28px 36px 22px;
  }

  h1 {
    font-size: 13.5px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-align: center;
    margin-bottom: 22px;
    color: #1a1a2e;
  }

  /* ── node base ───────────────────────────────────────── */
  .node {
    border: 1.5px solid #8899bb;
    border-radius: 6px;
    background: #fff;
    padding: 7px 12px;
    text-align: center;
    line-height: 1.4;
    font-size: 10.5px;
    box-shadow: 0 1px 3px rgba(0,0,0,.08);
  }
  .node.camera   { background: #fff8e6; border-color: #c8921a; color: #4a2e00; font-weight: 600; }
  .node.rpi-node { background: #e8f0fc; border-color: #1a5fb4; }
  .node.files    { background: #fef9e6; border-color: #b8860b; border-style: dashed; }
  .node.client   { background: #fafafa; border-color: #555; }

  /* ── RPi group box ───────────────────────────────────── */
  .rpi-box {
    border: 2px solid #1a5fb4;
    border-radius: 10px;
    background: #f0f5fd;
    padding: 10px 18px 14px;
  }
  .rpi-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #1a5fb4;
    margin-bottom: 10px;
    padding-bottom: 5px;
    border-bottom: 1px solid #b8d0f0;
    text-align: center;
  }

  /* ── vertical arrow ──────────────────────────────────── */
  .v-arrow {
    display: flex;
    flex-direction: column;
    align-items: center;
    color: #4a6fa5;
    font-size: 13px;
    margin: 2px 0;
    line-height: 1;
  }
  .v-arrow .line {
    width: 1.5px;
    background: #4a6fa5;
    min-height: 8px;
  }
  .v-arrow.label-arrow { position: relative; }
  .arrow-label {
    font-size: 8.5px;
    color: #666;
    white-space: nowrap;
    background: #fff;
    padding: 0 3px;
    margin: 1px 0;
  }

  /* ── outer grid ──────────────────────────────────────── */
  .layout {
    display: grid;
    grid-template-columns: 140px 28px 200px 28px 140px;
    grid-template-rows: auto auto auto;
    column-gap: 0;
    row-gap: 0;
    align-items: center;
    justify-items: center;
    width: 100%;
    max-width: 560px;
    margin: 0 auto;
  }

  /* helper flex col */
  .vcol { display: flex; flex-direction: column; align-items: center; gap: 0; width: 100%; }
</style>
</head>
<body>

<div class="layout">

  <!-- row 1: empty | Camera | empty -->
  <div></div>
  <div></div>
  <div class="node camera" style="width:100%;">Raspberry Pi Camera Module 3</div>
  <div></div>
  <div></div>

  <!-- row 2: Files | h-arrow | RPi box | h-arrow | (empty) -->
  <div class="vcol" style="align-self:center; padding-top:60px;">
    <div class="node files" style="width:100%; text-align:center;">
      Dataset /<br>image files
    </div>
  </div>

  <!-- diagonal / connecting arrow from files → PRE drawn as a right-pointing arrow -->
  <div style="align-self:center; padding-top:60px; font-size:14px; color:#b8860b;">→</div>

  <!-- RPi box in the middle -->
  <div class="vcol">
    <!-- camera to CSI arrow -->
    <div class="v-arrow"><div class="line" style="min-height:10px;"></div>▼</div>

    <div class="rpi-box" style="width:100%;">
      <div class="rpi-title">Raspberry Pi Zero 2 W</div>
      <div class="vcol">
        <div class="node rpi-node" style="width:100%;">CSI / capture</div>
        <div class="v-arrow"><div class="line"></div>▼</div>
        <div class="node rpi-node" style="width:100%;">Preprocess</div>
        <div class="v-arrow"><div class="line"></div>▼</div>
        <div class="node rpi-node" style="width:100%;">
          ONNX Runtime<br>
          <span style="font-size:9px; color:#3a5fa0;">MobileNet V3 ONNX</span>
        </div>
        <div class="v-arrow"><div class="line"></div>▼</div>
        <div class="node rpi-node" style="width:100%;">Web server + portal</div>
      </div>
    </div>

    <!-- web → client arrow -->
    <div class="v-arrow label-arrow">
      <div class="line" style="min-height:8px;"></div>
      <span class="arrow-label">local network</span>
      <div class="line" style="min-height:8px;"></div>
      ▼
    </div>

    <div class="node client" style="width:100%; text-align:center;">
      Browser<br>
      <span style="font-size:9px; color:#555;">(phone or laptop)</span>
    </div>
  </div>

  <div></div>
  <div></div>

</div>

<!-- legend -->
<div style="margin-top:20px; max-width:560px; margin-left:auto; margin-right:auto;
            border-top:1px solid #dde3f0; padding-top:10px;
            display:flex; gap:22px; flex-wrap:wrap; font-size:9.5px; color:#555;">
  <span><span style="color:#1a5fb4; font-weight:600;">■</span> On-device (Raspberry Pi)</span>
  <span><span style="color:#c8921a; font-weight:600;">■</span> Hardware peripheral</span>
  <span style="border:1px dashed #b8860b; padding:0 4px; border-radius:3px;">Dataset files</span>
</div>

</body>
</html>
